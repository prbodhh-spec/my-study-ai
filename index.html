<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio AI - Virtual Library</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>
<body>

    <div class="mesh-bg"></div>

    <header class="app-bar">
        <div class="brand">Studio<span>.AI</span></div>
        <div class="actions">
            <button id="toggle-library" class="glass-btn">📚 My Library</button>
            <input type="file" id="file-selector" accept=".pdf" style="display: none;">
            <label for="file-selector" class="glass-btn primary">+ Add Book</label>
        </div>
    </header>

    <main class="app-workspace">
        <div class="book-container">
            <div id="book">
                </div>
        </div>
    </main>

    <div id="library-drawer" class="glass-panel drawer">
        <div class="drawer-header">
            <h2>Local Library</h2>
            <p>Books are saved to your device.</p>
            <button id="close-library" class="close-btn">&times;</button>
        </div>
        <div id="book-list" class="drawer-content"></div>
    </div>

    <div id="ai-sidebar" class="glass-panel right-sidebar">
        <div class="sidebar-header">
            <h2>Gemini AI ✨</h2>
            <button id="close-sidebar" class="close-btn">&times;</button>
        </div>
        <div class="api-key-section" id="api-key-section">
            <input type="password" id="gemini-key-input" placeholder="Paste Gemini API Key here...">
            <button id="save-key-btn">Save</button>
        </div>
        <div id="ai-response-content" class="ai-content">
            Highlight text in the book to ask Gemini to explain it.
        </div>
    </div>

    <button id="gemini-popup-btn">Ask AI ✨</button>

    <audio id="flip-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
